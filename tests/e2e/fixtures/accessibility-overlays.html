<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Overlay accessibility</title>
    <link rel="stylesheet" href="/tokens/index.css" />
    <style>
      .clipped-modal-parent {
        width: 1px;
        height: 1px;
        overflow: hidden;
        transform: translateZ(0);
      }

      #collision-anchor {
        position: fixed;
        right: 8px;
        bottom: 8px;
      }
    </style>
  </head>
  <body>
    <button id="before">Before</button>
    <button id="menu-anchor" aria-haspopup="menu" aria-controls="action-menu" aria-expanded="false">Actions</button>
    <ds-menu id="action-menu" anchor-id="menu-anchor" menu-label="Actions"></ds-menu>
    <button id="after-menu">After menu</button>

    <button id="rich-anchor" aria-haspopup="dialog" aria-controls="rich-menu" aria-expanded="false">Appearance</button>
    <ds-menu id="rich-menu" anchor-id="rich-anchor" menu-label="Appearance"></ds-menu>

    <button id="modal-trigger">Open modal</button>
    <div id="page-content"><button id="outside-action">Outside action</button></div>
    <div class="clipped-modal-parent">
      <ds-modal id="modal" heading="Confirm changes" aria-describedby="modal-description">
        <p id="modal-description">Review these changes before saving.</p>
        <button id="inside-first">First action</button>
        <button id="inside-last">Last action</button>
        <ds-button-filled slot="footer" id="modal-save" label="Save"></ds-button-filled>
        <ds-button-unfilled slot="footer" id="modal-cancel" label="Cancel"></ds-button-unfilled>
      </ds-modal>
    </div>
    <ds-modal id="modal-no-footer" heading="Update complete">
      <p>The update is ready.</p>
    </ds-modal>
    <button id="after-modal">After modal</button>

    <button id="collision-anchor" aria-haspopup="menu" aria-controls="collision-menu" aria-expanded="false">More</button>
    <ds-menu id="collision-menu" anchor-id="collision-anchor" menu-label="Collision actions"></ds-menu>

    <script type="module" src="/accessibility-overlays-setup.mjs"></script>
  </body>
</html>
