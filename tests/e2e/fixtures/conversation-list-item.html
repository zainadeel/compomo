<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Conversation list item e2e</title>
    <link rel="stylesheet" href="/tokens/index.css" />
  </head>
  <body style="margin: 0">
    <div style="width: 300px">
      <ds-conversation-list-item
        id="conversation"
        conversation-id="route-plan"
        conversation-title="Plan a service route"
        preview="This preview is deliberately long enough that it must truncate after exactly one line."
        updated-at="2026-07-18T12:00:00Z"
      >
        <ds-button-unfilled
          slot="actions"
          id="conversation-actions-trigger"
          variant="icon"
          icon="Ellipses"
          rounded
          has-border="false"
          aria-label="Chat options"
        ></ds-button-unfilled>
      </ds-conversation-list-item>
      <ds-conversation-list-item
        id="unread-conversation"
        conversation-id="inspection-notes"
        conversation-title="Review inspection notes"
        preview="Five vehicles need follow-up this week."
        updated-at="2026-07-18T13:00:00Z"
        unread-count="2"
      ></ds-conversation-list-item>
      <ds-conversation-list-item
        id="busy-conversation"
        conversation-id="review-records"
        conversation-title="Review records"
        state="busy"
        status-label="Working…"
      ></ds-conversation-list-item>
    </div>
    <ds-conversation-list
      id="conversation-list"
      action-layout="footer"
      style="display:block; width:300px; height:120px; margin-top:16px;"
    >
      <ds-conversation-list-item
        id="overlay-conversation"
        conversation-id="overlay-regression"
        conversation-title="Backdrop blur regression"
        preview="This text must remain available to the contextual action backdrop."
        updated-at="2026-07-18T14:00:00Z"
      >
        <ds-button-unfilled
          slot="actions"
          variant="icon"
          icon="Ellipses"
          rounded
          has-border="false"
          aria-label="Overlay chat options"
        ></ds-button-unfilled>
      </ds-conversation-list-item>
      <button slot="actions" type="button" style="display:block; width:100%; height:32px;">
        New chat
      </button>
    </ds-conversation-list>
    <script type="module" src="/conversation-list-item-setup.mjs"></script>
  </body>
</html>
