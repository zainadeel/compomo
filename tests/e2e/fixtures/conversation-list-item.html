<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Conversation list item e2e</title>
    <link rel="stylesheet" href="/tokens/index.css" />
  </head>
  <body style="margin: 0">
    <div style="width: 300px">
      <ds-conversation-list-item
        id="conversation"
        conversation-id="route-plan"
        conversation-title="Plan a service route"
        preview="This preview is deliberately long enough that it must truncate after exactly one line."
        updated-at="2026-07-18T12:00:00Z"
      >
        <ds-button-unfilled
          slot="actions"
          id="conversation-actions-trigger"
          variant="icon"
          icon="Ellipses"
          rounded
          has-border="false"
          aria-label="Chat options"
        ></ds-button-unfilled>
      </ds-conversation-list-item>
      <ds-conversation-list-item
        id="unread-conversation"
        conversation-id="inspection-notes"
        conversation-title="Review inspection notes"
        preview="Five vehicles need follow-up this week."
        updated-at="2026-07-18T13:00:00Z"
        unread-count="2"
      ></ds-conversation-list-item>
    </div>
    <script type="module" src="/conversation-list-item-setup.mjs"></script>
  </body>
</html>
