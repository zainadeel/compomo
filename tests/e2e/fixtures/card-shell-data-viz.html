<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Data visualization card shell</title>
    <link rel="stylesheet" href="/tokens/index.css">
  </head>
  <body>
    <ds-card-shell-data-viz id="viz-shell" heading="Fuel trend" card-width="sm">
      <ds-button-unfilled
        slot="actions"
        variant="icon"
        icon="Filters"
        aria-label="Filter fuel trend"
      ></ds-button-unfilled>
      <div id="viz-content">Visualization content</div>
    </ds-card-shell-data-viz>

    <ds-card-data-viz-donut id="donut-card" heading="Availability status" card-width="sm">
      <div slot="chart">Donut chart</div>
      <div slot="legend">Donut legend</div>
    </ds-card-data-viz-donut>

    <ds-card-data-viz-line id="line-card" heading="Fuel trend" card-width="sm">
      <ds-chart-line slot="chart" width="480" height="240"></ds-chart-line>
      <ds-chart-legend slot="legend" direction="horizontal"></ds-chart-legend>
    </ds-card-data-viz-line>

    <ds-card-data-viz-bar id="bar-card" heading="Vehicle activity" card-width="sm">
      <ds-chart-bar-stacked slot="chart" width="480" height="240"></ds-chart-bar-stacked>
      <ds-chart-legend slot="legend" direction="horizontal"></ds-chart-legend>
    </ds-card-data-viz-bar>

    <script type="module" src="/card-shell-data-viz-setup.mjs"></script>
  </body>
</html>
