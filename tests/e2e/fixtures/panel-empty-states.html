<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Panel empty states e2e</title>
    <link rel="stylesheet" href="/tokens/index.css" />
    <style>
      body {
        display: flex;
        gap: 16px;
        margin: 0;
      }

      #generic,
      #conversations,
      #activity {
        display: block;
        width: 300px;
        height: 240px;
      }

      #generic-content {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        padding: 8px;
        box-sizing: border-box;
      }

      #generic-empty {
        display: grid;
        flex: 1 1 auto;
        min-height: 0;
      }

      .footer {
        padding: 8px;
      }

      .footer button {
        display: block;
        width: 100%;
        height: 32px;
      }
    </style>
  </head>
  <body>
    <ds-scroll-overlay id="generic" scroll-label="Generic panel">
      <div id="generic-content">
        <div id="generic-empty">
          <ds-empty-state
            heading="No results"
            body="Try a different search."
          ></ds-empty-state>
        </div>
      </div>
      <div slot="overlay" class="footer">
        <button type="button">Persistent action</button>
      </div>
    </ds-scroll-overlay>

    <ds-conversation-list id="conversations" action-layout="footer">
      <button slot="actions" type="button">New conversation</button>
    </ds-conversation-list>

    <ds-conversation-list id="activity"></ds-conversation-list>

    <script type="module" src="/panel-empty-states-setup.mjs"></script>
  </body>
</html>
