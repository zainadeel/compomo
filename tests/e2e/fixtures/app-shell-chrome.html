<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>App shell chrome e2e</title>
    <link rel="stylesheet" href="/tokens/index.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--typography-font-family, system-ui);
        background: var(--color-background-primary);
      }
      ds-app-shell {
        display: block;
        width: 1280px;
        height: 720px;
      }
    </style>
  </head>
  <body>
    <ds-app-shell gradient>
      <ds-panel-nav slot="panel" id="panel" router-mode="event"></ds-panel-nav>
      <ds-panel-tools slot="tools" id="tools">
        <ds-text variant="text-body-medium" color="secondary">Agents panel</ds-text>
      </ds-panel-tools>
      <main slot="default">Page content</main>
    </ds-app-shell>
    <script type="module" src="/app-shell-chrome-setup.mjs"></script>
  </body>
</html>
