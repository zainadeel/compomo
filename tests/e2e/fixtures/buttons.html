<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <title>Button loading e2e</title>
    <link rel="stylesheet" href="/tokens/index.css">
  </head>
  <body>
    <main>
      <h1>Button loading test</h1>
      <ds-button-filled id="filled-label" variant="label" label="Save"></ds-button-filled>
      <ds-button-filled id="filled-icon" variant="icon" icon="Check" aria-label="Save"></ds-button-filled>
      <ds-button-filled id="filled-icon-label" variant="icon-label" icon="Check" label="Save"></ds-button-filled>
      <ds-button-filled id="filled-bordered" label="Confirm" has-border background="medium"></ds-button-filled>
      <ds-button-unfilled id="unfilled-label" variant="label" label="Cancel"></ds-button-unfilled>
      <ds-button-unfilled id="unfilled-icon" variant="icon" icon="Close" aria-label="Cancel"></ds-button-unfilled>
      <ds-button-unfilled id="unfilled-icon-label" variant="icon-label" icon="Close" label="Cancel"></ds-button-unfilled>
      <ds-button-filled id="filled-inactive" label="Unavailable" is-inactive></ds-button-filled>
      <ds-button-unfilled id="unfilled-inactive" label="Unavailable" is-inactive></ds-button-unfilled>
      <form id="button-form">
        <label for="form-value">Form value</label>
        <input id="form-value" name="value" value="initial">
        <ds-button-filled id="filled-submit" label="Submit primary" type="submit"></ds-button-filled>
        <ds-button-unfilled id="unfilled-submit" label="Submit secondary" type="submit"></ds-button-unfilled>
        <ds-button-unfilled id="unfilled-reset" label="Reset" type="reset"></ds-button-unfilled>
      </form>
    </main>
    <script type="module" src="/buttons-setup.mjs"></script>
  </body>
</html>
