name: PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate conventional title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|perf|revert|docs|style|refactor|test|build|ci|chore)(\([^)]+\))?!?: (.+)$'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title must use an allowed conventional-commit type, optional scope, and subject."
            exit 1
          fi

          subject="${BASH_REMATCH[3]}"
          if [[ "$subject" =~ ^[A-Z] ]]; then
            echo "::error::Subject must start with a lowercase letter."
            exit 1
          fi
