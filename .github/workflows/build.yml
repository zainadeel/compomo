name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Verify npm pack (nav + utils)
        run: npm run verify:pack

      - name: Verify dist artifacts
        run: |
          for f in \
            dist/components/index.js \
            dist/components/index.d.ts; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing expected output: $f"
              exit 1
            fi
          done
          echo "✅ All expected dist files present."

      - name: Verify src/ was not mutated by build
        run: |
          if [ -n "$(git status --porcelain src/)" ]; then
            echo "❌ Build mutated src/ — this should never happen:"
            git diff src/
            exit 1
          fi
          echo "✅ src/ is clean."

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps

      - name: E2E tests
        run: npx playwright test
