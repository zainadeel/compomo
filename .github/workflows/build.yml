name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E tests (BarNav overflow)
        run: npx playwright test

      - name: Verify dist artifacts
        run: |
          for f in \
            dist/components/index.js \
            dist/components/index.d.ts; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing expected output: $f"
              exit 1
            fi
          done
          echo "✅ All expected dist files present."

      - name: Verify src/ was not mutated by build
        run: |
          if [ -n "$(git status --porcelain src/)" ]; then
            echo "❌ Build mutated src/ — this should never happen:"
            git diff src/
            exit 1
          fi
          echo "✅ src/ is clean."
