name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Stencil library
        run: npm run build

      - name: Build Storybook
        run: npx storybook build --output-dir storybook-static
        env:
          # GitHub Pages project sites live at /RepoName/ — Storybook
          # needs this so all asset paths resolve correctly.
          STORYBOOK_BASE_URL: /compomo/
          # Stamped into the Storybook chrome so designers know which build they are viewing.
          STORYBOOK_BUILT_AT: ${{ github.event.head_commit.timestamp || github.run_started_at }}

      - name: Build component registry
        run: npm run registry:build

      - name: Copy registry into Storybook output
        run: cp -r public/r storybook-static/r

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
