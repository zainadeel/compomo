name: Deploy Storybook to GitHub Pages

on:
  workflow_call:
    inputs:
      ref:
        description: Git tag or SHA to build and deploy (defaults to the triggering commit)
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag or SHA to build and deploy (optional — defaults to main)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Stencil library
        run: npm run build

      - name: Build Storybook
        run: npx storybook build --output-dir storybook-static
        env:
          # GitHub Pages project sites live at /RepoName/ — Storybook
          # needs this so all asset paths resolve correctly.
          STORYBOOK_BASE_URL: /compomo/

      - name: Build component registry
        run: npm run registry:build

      - name: Copy registry into Storybook output
        run: cp -r public/r storybook-static/r

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: ./.github/actions/retry-deploy-pages
