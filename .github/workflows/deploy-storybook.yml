name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npx storybook build --output-dir storybook-static
        env:
          # GitHub Pages project sites live at /RepoName/ — Storybook
          # needs this so all asset paths resolve correctly.
          STORYBOOK_BASE_URL: /compomo/

      - name: Build component registry
        run: npm run registry:build

      - name: Copy registry into Storybook output
        run: cp -r public/r storybook-static/r

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
