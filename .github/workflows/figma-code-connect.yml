# Publishes Code Connect templates to Figma when mapping files change on main.
# Requires repo secret FIGMA_ACCESS_TOKEN (see README → Figma Code Connect).
name: Figma Code Connect

on:
  push:
    branches: [main]
    paths:
      - 'code-connect/**'
      - 'figma.config.json'
      - 'tsconfig.figma.json'
      - '.github/workflows/figma-code-connect.yml'
  workflow_dispatch:

concurrency:
  group: figma-code-connect-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish mappings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Figma
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: npm run figma:connect:publish
